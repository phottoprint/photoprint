<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER HUB | PHOTO PRINT</title>
    <style>
        :root {
            --neon: #39ff14;
            --bg: #0a0a0a;
            --card: rgba(255, 255, 255, 0.03);
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100vh;
            background-color: var(--bg);
            color: white; font-family: 'Orbitron', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow-x: hidden; /* Evita rolagem lateral */
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1a3a12 0%, #000 60%);
            z-index: -1;
        }

        h1.login-title {
            font-size: clamp(2rem, 8vw, 5.5rem); 
            margin: 0;
            color: var(--neon); text-transform: uppercase;
            text-shadow: 0 0 20px var(--neon);
            animation: glitch 3s infinite;
            text-align: center;
        }

        .login-subtitle {
            font-size: 0.7rem; letter-spacing: 5px; opacity: 0.6;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-align: center;
        }

        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            width: 95%; /* Ajuste para celular */
        }

        .login-box {
            background: var(--card);
            backdrop-filter: blur(20px);
            padding: 30px 15px; border-radius: 20px;
            border: 1px solid rgba(57, 255, 20, 0.2);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
        }

        input {
            background: #000; border: 1px solid #333;
            color: var(--neon); padding: 15px; width: 100%;
            max-width: 180px;
            text-align: center; font-size: 1.2rem; outline: none;
            border-radius: 5px; margin-bottom: 20px;
            font-family: 'Orbitron', sans-serif;
            -webkit-text-security: disc;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        .btn-login {
            background: var(--neon); color: #000;
            border: none; padding: 15px 30px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            width: 100%; max-width: 180px;
        }

        #hub-content { 
            display: none; width: 100%; flex-direction: column; align-items: center;
            padding: 20px 0;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 5.5rem); margin: 0;
            color: var(--neon); text-transform: uppercase;
            text-shadow: 0 0 20px var(--neon);
            animation: glitch 3s infinite;
            text-align: center;
        }

        .subtitle {
            font-size: 0.7rem; letter-spacing: 5px; opacity: 0.6;
            margin-bottom: 30px; text-transform: uppercase;
            text-align: center;
        }

        .container {
            display: grid; 
            /* AJUSTE MOBILE: 1 coluna no celular, 2 em telas maiores */
            grid-template-columns: 1fr; 
            gap: 15px; 
            width: 90%; 
            max-width: 1100px;
        }

        /* Responsividade para Tablet/Desktop */
        @media (min-width: 600px) {
            .container { grid-template-columns: repeat(2, 1fr); }
        }

        .btn {
            position: relative; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border-left: 4px solid var(--neon); 
            padding: 20px 15px; /* Reduzido para caber melhor em telas pequenas */
            text-decoration: none; color: white; font-weight: bold;
            display: flex; align-items: center; gap: 15px;
            transition: 0.4s; overflow: hidden;
            border-radius: 0 15px 15px 0;
            box-sizing: border-box;
        }

        .btn:hover {
            background: rgba(57, 255, 20, 0.1);
            transform: translateX(5px);
        }

        .btn span { font-size: 1.4rem; filter: drop-shadow(0 0 5px var(--neon)); }
        .btn div { font-size: 0.9rem; } /* Ajuste no texto do botão */

        #back-to-login {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            cursor: pointer;
            z-index: 100;
            color: var(--neon);
            font-size: 2rem;
            text-shadow: 0 0 10px var(--neon);
            animation: pulse-neon 1.5s infinite;
            transition: 0.3s;
        }

        @keyframes pulse-neon {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            2% { transform: skew(10deg); }
            4% { transform: skew(-10deg); }
            6% { transform: skew(0deg); }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="back-to-login" onclick="logout()">
        <span title="Voltar para Login">⬅</span>
    </div>

    <div id="login-screen">
        <h1 class="login-title">Photo Print</h1>
        <div class="login-subtitle">colecionando momentos</div>

        <div class="login-box">
            <h2 style="color:var(--neon); font-size: 1rem;">SISTEMA RESTRITO</h2>
            <p style="font-size: 0.8rem;">Insira a senha de acesso</p>
            <input type="tel" id="pass" placeholder="••••" inputmode="numeric" autofocus> <br>
            <button class="btn-login" onclick="checkPass()">Acessar Terminal</button>
        </div>
    </div>

    <div id="hub-content">
        <h1>Photo Print</h1>
        <div class="subtitle">colecionando momentos</div>

        <div class="container">
            <a href="celular.html" class="btn" target="_blank"><span>📸</span> <div>INDEX CELULAR <small style="display:block; opacity:0.5; font-size:10px">Captura Mobile</small></div></a>
            <a href="painel.html" class="btn" target="_blank"><span>⚙️</span> <div>PAINEL CONTROLE <small style="display:block; opacity:0.5; font-size:10px">Configuração Global</small></div></a>
            <a href="quiosque.html" class="btn" target="_blank"><span>🔍</span> <div>QUIOSQUE BUSCA <small style="display:block; opacity:0.5; font-size:10px">Interface Local</small></div></a>
            <a href="galeria.html" class="btn" target="_blank"><span>🖼️</span> <div>GALERIA CLIENTE <small style="display:block; opacity:0.5; font-size:10px">Download & QR</small></div></a>
            <a href="telao.html" class="btn" target="_blank"><span>🖥️</span> <div>TELÃO SLIDESHOW <small style="display:block; opacity:0.5; font-size:10px">Exibição de Fotos</small></div></a>
        </div>
    </div>

    <script>
        function checkPass() {
            const passInput = document.getElementById('pass');
            const pass = passInput.value;
            if(pass === "1234") { 
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('hub-content').style.display = 'flex';
                document.getElementById('back-to-login').style.display = 'block';
            } else {
                alert("ACESSO NEGADO");
                passInput.value = "";
                passInput.focus();
            }
        }

        function logout() {
            document.getElementById('pass').value = "";
            document.getElementById('hub-content').style.display = 'none';
            document.getElementById('back-to-login').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('pass').focus();
        }

        document.getElementById('pass').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                checkPass();
            }
        });
    </script>

</body>
</html>
