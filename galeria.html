<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO PRINT - MOLDURA DINÂMICA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --bg: #020202; 
            --accent: #39ff14;
            --danger: #ff3131; 
            --text: #ffffff;
            --neon-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
            --glass-border: 1px solid rgba(57, 255, 20, 0.3);
        }

        body { 
            background: #000; 
            color: var(--text); 
            font-family: sans-serif; 
            margin: 0; 
        }

        /* --- CONFIGURAÇÃO DE IMPRESSÃO DINÂMICA --- */
        #modal-print { display: none; }

        @media print {
            body * { visibility: hidden !important; }
            @page { margin: 0; } /* Remove bordas, cabeçalhos e rodapés */
            
            #modal-print {
                display: block !important;
                visibility: visible !important;
                position: fixed;
                top: 0;
                left: 0;
                margin: 0 !important;
                padding: 0 !important;
            }

            #modal-print img {
                display: block;
                width: 100%; /* Ocupa o tamanho definido pelo JS */
                height: 100%;
            }
        }

        /* Estilos da Galeria (Simplificados para foco no código) */
        header { padding: 30px; text-align: center; border-bottom: var(--glass-border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { border-radius: 10px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); }
        .card img { width: 100%; display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
        .modal img { max-width: 90%; max-height: 80vh; }
        .reprint-btn { margin-top: 20px; background: var(--accent); padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1 style="color:var(--accent)">PHOTO PRINT</h1>
        <p id="view-evento">CARREGANDO...</p>
    </header>

    <main class="gallery-container">
        <div id="grid-fotos" class="grid"></div>
    </main>

    <div class="modal" id="modal-zoom" onclick="this.style.display='none'">
        <img id="img-zoom">
        <button class="reprint-btn" onclick="event.stopPropagation(); reimprimirAtual()">🖨️ IMPRIMIR</button>
    </div>

    <div id="modal-print"></div>
    
    <canvas id="canvas-process" style="display:none;"></canvas>

<script>
    const API = "https://photoprint-api.maxprimefotovideo.workers.dev";
    let todasFotos = [];
    let chavesLocais = new Set();
    let processadas = new Set(JSON.parse(localStorage.getItem('impressas_local') || '[]'));
    let printQueue = [];
    let isPrinting = false;
    let molduraDimensoes = { w: 0, h: 0 };

    async function atualizar() {
        try {
            const resStatus = await fetch(`${API}/status?t=${Date.now()}`);
            const config = await resStatus.json();
            document.getElementById('view-evento').innerText = (config.evento || "Geral").toUpperCase();

            const resF = await fetch(`${API}/list-photos?evento=${encodeURIComponent(config.evento)}&t=${Date.now()}`);
            const dados = await resF.json();
            
            const molduraObj = dados.find(f => f.key.toLowerCase().endsWith('.png'));
            const urlMoldura = molduraObj ? `${API}/photo/${encodeURIComponent(molduraObj.key)}?t=${Date.now()}` : "";
            const fotosJpg = dados.filter(f => !f.key.toLowerCase().endsWith('.png'));

            for (const f of fotosJpg) {
                if (!chavesLocais.has(f.key)) {
                    const imgFundida = await fundirImagem(`${API}/photo/${encodeURIComponent(f.key)}`, urlMoldura);
                    todasFotos.push({ key: f.key, url: imgFundida, id: fotosJpg.indexOf(f) + 1 });
                    chavesLocais.add(f.key);
                    
                    if (!processadas.has(f.key)) {
                        processadas.add(f.key);
                        localStorage.setItem('impressas_local', JSON.stringify([...processadas]));
                        addToPrintQueue(imgFundida);
                    }
                }
            }
            render();
        } catch(e) { console.error(e); }
    }

    async function fundirImagem(fotoUrl, molduraUrl) {
        const canvas = document.getElementById('canvas-process');
        const ctx = canvas.getContext('2d');
        
        const load = (src) => new Promise(res => {
            const i = new Image(); i.crossOrigin = "anonymous";
            i.onload = () => res(i); i.onerror = () => res(null);
            i.src = src;
        });

        const imgFoto = await load(fotoUrl);
        const imgM = molduraUrl ? await load(molduraUrl) : null;

        if (imgM) {
            // Define o tamanho do canvas baseado na MOLDURA
            canvas.width = imgM.width;
            canvas.height = imgM.height;
            
            // Guarda as dimensões para a impressão
            molduraDimensoes = { w: imgM.width, h: imgM.height };

            // Desenha a foto preenchendo o fundo
            ctx.drawImage(imgFoto, 0, 0, imgM.width, imgM.height);
            // Desenha a moldura por cima
            ctx.drawImage(imgM, 0, 0, imgM.width, imgM.height);
        } else {
            canvas.width = imgFoto.width;
            canvas.height = imgFoto.height;
            ctx.drawImage(imgFoto, 0, 0);
        }
        
        return canvas.toDataURL("image/jpeg", 0.95);
    }

    function render() {
        const grid = document.getElementById('grid-fotos');
        grid.innerHTML = todasFotos.slice().reverse().map(f => `
            <div class="card" onclick="abrirZoom('${f.url}')">
                <img src="${f.url}">
                <div style="padding:10px; text-align:center; font-weight:bold">#${f.id}</div>
            </div>
        `).join('');
    }

    function abrirZoom(url) {
        document.getElementById('img-zoom').src = url;
        document.getElementById('modal-zoom').style.display = 'flex';
    }

    function reimprimirAtual() { addToPrintQueue(document.getElementById('img-zoom').src); }

    function addToPrintQueue(src) { 
        printQueue.push(src); 
        if (!isPrinting) processQueue(); 
    }

    function processQueue() {
        if (printQueue.length === 0) { isPrinting = false; return; }
        isPrinting = true;
        
        const currentSrc = printQueue.shift();
        const containerPrint = document.getElementById('modal-print');
        
        // Limpa e recria a imagem de impressão
        containerPrint.innerHTML = `<img src="${currentSrc}">`;
        
        // Conversão de Pixels para Centímetros (Baseado em 96 DPI)
        // Isso diz ao navegador qual o tamanho físico do elemento
        const larguraCm = (molduraDimensoes.w / 37.795).toFixed(2);
        const alturaCm = (molduraDimensoes.h / 37.795).toFixed(2);

        containerPrint.style.width = larguraCm + "cm";
        containerPrint.style.height = alturaCm + "cm";

        const imgElement = containerPrint.querySelector('img');
        imgElement.onload = () => {
            setTimeout(() => { 
                window.print(); 
                setTimeout(() => { processQueue(); }, 3000); 
            }, 1000);
        };
    }

    setInterval(atualizar, 5000);
    atualizar();
</script>
</body>
</html>
