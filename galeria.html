<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO PRINT - Panel v2.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --bg: #020202; --accent: #39ff14; --danger: #ff3131; --text: #ffffff;
            --neon-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
            --glass-border: 1px solid rgba(57, 255, 20, 0.3);
        }

        body { background: #000; color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* CORREÇÃO 3: TELA BRANCA NA IMPRESSÃO */
        #modal-print { display: none; } 

        @media print {
            body * { visibility: hidden !important; }
            html, body { background: #fff !important; margin: 0 !important; padding: 0 !important; }
            #modal-print { 
                display: block !important; 
                visibility: visible !important;
                position: fixed; 
                top: 0; 
                left: 0; 
                width: 100vw; 
                height: 100vh;
                z-index: 9999;
            }
            #modal-print img { 
                visibility: visible !important;
                width: 100%; 
                height: 100%; 
                object-fit: contain;
                display: block; 
            }
            @page { margin: 0; size: auto; }
        }

        header { padding: 40px; display: flex; flex-direction: column; align-items: center; border-bottom: var(--glass-border); background: linear-gradient(to bottom, #111, #000); }
        .brand-center h1 { color: var(--accent); text-shadow: var(--neon-shadow); letter-spacing: 8px; margin: 0; font-size: 3rem; }
        .version-tag { font-size: 0.8rem; opacity: 0.5; letter-spacing: 2px; }
        
        .search-container { margin-top: 20px; display: flex; gap: 10px; }
        .search-container input { background: #111; border: 1px solid var(--accent); color: #fff; padding: 12px; border-radius: 25px; width: 200px; outline: none; }
        .search-btn { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        .gallery-container { padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        .card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #333; cursor: pointer; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; display: block; }
        .badge { position: absolute; top: 8px; right: 8px; background: var(--accent); color: #000; padding: 2px 8px; font-weight: bold; border-radius: 4px; font-size: 11px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; flex-direction: column; }
        .modal img { max-height: 75vh; border: 2px solid var(--accent); }
        .modal-actions { display: flex; gap: 15px; margin-top: 20px; }
        
        .btn-act { padding: 12px 30px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .btn-print { background: var(--accent); color: #000; }
        .btn-delete { background: var(--danger); color: #fff; }

        .sidebar { position: fixed; right: -300px; top: 0; width: 260px; height: 100%; background: #0a0a0a; z-index: 5000; transition: 0.4s; padding: 30px; border-left: var(--glass-border); }
        .sidebar.active { right: 0; }
        .menu-trigger { position: absolute; right: 20px; top: 20px; cursor: pointer; z-index: 5001; color: var(--accent); font-size: 24px; }
    </style>
</head>
<body>

    <div class="menu-trigger" onclick="document.getElementById('sidebar').classList.toggle('active')"><i class="fas fa-cog"></i></div>

    <div class="sidebar" id="sidebar">
        <h3 style="color: var(--accent);">CONFIGURAÇÕES</h3>
        <label>Layout:</label>
        <select id="formato-saida" style="width: 100%; padding: 10px; margin-bottom: 20px;">
            <option value="tirinha" selected>Tirinha (3 fotos)</option>
            <option value="tradicional">Tradicional (1 foto)</option>
        </select>
        <button onclick="baixarZip()" style="width:100%; padding:10px; margin-bottom:10px;">ZIP DA GALERIA</button>
        <button onclick="limparTudo()" style="width:100%; padding:10px; background:var(--danger); color:#fff;">LIMPAR TUDO</button>
    </div>

    <header>
        <div class="brand-center">
            <h1>PHOTO PRINT</h1>
            <div class="version-tag">AVATAR & PHOTO SYSTEM v2.5</div>
            <p id="view-evento" style="opacity: 0.6;">CARREGANDO...</p>
        </div>
        <div class="search-container">
            <input type="number" id="input-busca" placeholder="Nº da Foto">
            <button class="search-btn" onclick="buscarBotao()">BUSCAR</button>
        </div>
    </header>

    <main class="gallery-container">
        <div id="grid-fotos" class="grid"></div>
    </main>

    <div class="modal" id="modal-zoom">
        <img id="img-zoom">
        <div class="modal-actions">
            <button class="btn-act btn-print" onclick="reimprimirAtual()">IMPRIMIR AGORA</button>
            <button class="btn-act btn-delete" onclick="excluirFotoAtual()">EXCLUIR</button>
            <button class="btn-act" onclick="fecharModal()">FECHAR</button>
        </div>
    </div>

    <div id="modal-print"></div>
    <canvas id="canvas-process" style="display:none;"></canvas>

<script>
    const API = "https://photoprint-api.maxprimefotovideo.workers.dev";
    let todasFotos = [];
    let chavesLocais = new Set();
    let processadas = new Set(JSON.parse(localStorage.getItem('pp_print_history') || '[]'));
    let printQueue = [];
    let isPrinting = false;
    let fotoAbertaKey = null;

    const DPI = 300 / 25.4; 
    const SPECS = {
        tradicional: { mmW: 150, mmH: 100, fW: 150, fH: 100, fX: 0, fY: 0, slots: 1 },
        tirinha:     { mmW: 50,  mmH: 150, fW: 42,  fH: 28,  fX: 4, fY: 6, gap: 38, slots: 3 }
    };

    async function atualizar() {
        try {
            const resStatus = await fetch(`${API}/status?t=${Date.now()}`);
            const config = await resStatus.json();
            document.getElementById('view-evento').innerText = config.evento.toUpperCase();

            const resF = await fetch(`${API}/list-photos?evento=${encodeURIComponent(config.evento)}&t=${Date.now()}`);
            const dados = await resF.json();
            
            const molduraObj = dados.find(f => f.key.toLowerCase().endsWith('.png'));
            const urlMoldura = molduraObj ? `${API}/photo/${encodeURIComponent(molduraObj.key)}` : "";
            
            // CORREÇÃO 1: Filtrar fotos ignorando a moldura
            const fotosJpg = dados.filter(f => !f.key.toLowerCase().endsWith('.png'));

            // Agrupar fotos de 3 em 3 para a tirinha
            if (document.getElementById('formato-saida').value === 'tirinha') {
                for (let i = 0; i < fotosJpg.length; i += 3) {
                    const grupo = fotosJpg.slice(i, i + 3);
                    const masterKey = grupo[0].key; // Usamos a primeira do grupo como referência

                    if (!chavesLocais.has(masterKey) && grupo.length === 3) {
                        const urlsGrupo = grupo.map(f => `${API}/photo/${encodeURIComponent(f.key)}`);
                        const imgFinal = await gerarComposicao(urlsGrupo, urlMoldura);
                        
                        todasFotos.push({ key: masterKey, url: imgFinal, id: Math.floor(i/3) + 1 });
                        chavesLocais.add(masterKey);
                        
                        if (!processadas.has(masterKey)) {
                            processadas.add(masterKey);
                            localStorage.setItem('pp_print_history', JSON.stringify([...processadas]));
                            addToPrintQueue(imgFinal);
                        }
                    }
                }
            } else {
                // Lógica tradicional (1 por 1)
                for (const f of fotosJpg) {
                    if (!chavesLocais.has(f.key)) {
                        const imgFinal = await gerarComposicao([`${API}/photo/${encodeURIComponent(f.key)}`], urlMoldura);
                        todasFotos.push({ key: f.key, url: imgFinal, id: fotosJpg.indexOf(f) + 1 });
                        chavesLocais.add(f.key);
                        if (!processadas.has(f.key)) {
                            processadas.add(f.key);
                            localStorage.setItem('pp_print_history', JSON.stringify([...processadas]));
                            addToPrintQueue(imgFinal);
                        }
                    }
                }
            }
            render();
        } catch(e) { console.error("Erro sync:", e); }
    }

    async function gerarComposicao(urlsFotos, molduraUrl) {
        const fmt = document.getElementById('formato-saida').value;
        const s = SPECS[fmt];
        const canvas = document.getElementById('canvas-process');
        const ctx = canvas.getContext('2d');
        
        canvas.width = s.mmW * DPI;
        canvas.height = s.mmH * DPI;
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0,0, canvas.width, canvas.height);

        const load = (url) => new Promise(res => {
            const i = new Image(); i.crossOrigin = "anonymous";
            i.onload = () => res(i); i.src = url;
        });

        // Carregar todas as fotos do grupo e a moldura
        const [imgsFotos, imgM] = await Promise.all([
            Promise.all(urlsFotos.map(url => load(url))),
            molduraUrl ? load(molduraUrl) : null
        ]);

        const w = s.fW * DPI;
        const h = s.fH * DPI;

        // CORREÇÃO 2: Distribuir cada foto em seu slot
        imgsFotos.forEach((img, i) => {
            if (i < s.slots) {
                const yPos = (s.fY * DPI) + (i * (s.gap || 0) * DPI);
                drawImageCover(ctx, img, s.fX * DPI, yPos, w, h);
            }
        });

        if (imgM) ctx.drawImage(imgM, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/jpeg", 0.95);
    }

    function drawImageCover(ctx, img, x, y, w, h) {
        const r = img.width / img.height;
        const targetR = w / h;
        let sx, sy, sw, sh;
        if (r > targetR) {
            sw = img.height * targetR; sh = img.height;
            sx = (img.width - sw) / 2; sy = 0;
        } else {
            sw = img.width; sh = img.width / targetR;
            sx = 0; sy = (img.height - sh) / 2;
        }
        ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    function render() {
        document.getElementById('grid-fotos').innerHTML = todasFotos.slice().reverse().map(f => `
            <div class="card" onclick="abrirZoom('${f.url}', '${f.key}')">
                <span class="badge">#${f.id}</span>
                <img src="${f.url}">
            </div>
        `).join('');
    }

    function addToPrintQueue(src) {
        printQueue.push(src);
        if (!isPrinting) processQueue();
    }

    async function processQueue() {
        if (printQueue.length === 0) { isPrinting = false; return; }
        isPrinting = true;
        const src = printQueue.shift();
        const container = document.getElementById('modal-print');
        container.innerHTML = `<img src="${src}">`;
        
        setTimeout(() => {
            window.print();
            setTimeout(processQueue, 3000); 
        }, 1200); // Tempo para renderizar no modal oculto
    }

    function abrirZoom(url, key) {
        fotoAbertaKey = key;
        document.getElementById('img-zoom').src = url;
        document.getElementById('modal-zoom').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modal-zoom').style.display = 'none'; }
    function reimprimirAtual() { addToPrintQueue(document.getElementById('img-zoom').src); }
    
    function buscarBotao() {
        const val = document.getElementById('input-busca').value;
        const achou = todasFotos.find(f => f.id == val);
        if(achou) abrirZoom(achou.url, achou.key);
    }

    async function excluirFotoAtual() {
        if(confirm("Deseja apagar esta foto do servidor?")) {
            await fetch(`${API}/photo?key=${encodeURIComponent(fotoAbertaKey)}`, { method: 'DELETE' });
            location.reload();
        }
    }

    async function limparTudo() {
        if(confirm("APAGAR TODA A GALERIA?")) {
            await fetch(`${API}/photo?key=all`, { method: 'DELETE' });
            localStorage.removeItem('pp_print_history');
            location.reload();
        }
    }

    setInterval(atualizar, 5000);
    atualizar();
</script>
</body>
</html>
