<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO PRINT - GALLERY v3.7</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --bg: #020202; --surface: rgba(18, 18, 18, 0.9); 
            --accent: #39ff14; --danger: #ff3131; --text: #ffffff;
            --neon-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
            --glass-border: 1px solid rgba(57, 255, 20, 0.3);
        }
        body { background: radial-gradient(circle at center, #0a1a05 0%, #000 100%); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* AJUSTES DE IMPRESSÃO */
        #modal-print { display: none; }

        @media print {
            @page { margin: 0; size: auto; }
            body * { visibility: hidden; display: none !important; }
            #modal-print, #modal-print img { display: flex !important; visibility: visible; }
            #modal-print {
                position: absolute; inset: 0; width: 100vw; height: 100vh;
                justify-content: center; align-items: center; background: white !important;
            }
            #img-print { max-width: 100% !important; max-height: 100% !important; width: auto !important; height: auto !important; }
        }

        header { padding: 50px 40px 30px; display: flex; flex-direction: column; align-items: center; }
        .brand-center h1 { margin: 0; font-size: 50px; color: var(--accent); text-shadow: var(--neon-shadow); letter-spacing: 10px; font-weight: 900; text-transform: uppercase; }
        
        .search-box { margin-top: 30px; display: flex; gap: 10px; }
        .search-box input { background: rgba(255,255,255,0.05); border: var(--glass-border); color: #fff; padding: 12px 20px; border-radius: 8px; width: 200px; outline: none; }
        .search-btn { background: var(--accent); color: #000; border: none; padding: 0 25px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; padding: 40px 60px; }
        .card { background: var(--surface); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: var(--neon-shadow); }
        .card img { width: 100%; display: block; }
        .card .badge { position: absolute; top: 10px; right: 10px; background: var(--accent); color: #000; padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }

        /* SIDEBAR */
        .sidebar { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: rgba(10, 10, 10, 0.95); z-index: 5000; transition: 0.5s; padding: 120px 25px; border-left: var(--glass-border); }
        .sidebar.active { right: 0; }
        .sidebar-btn { width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 15px; font-weight: bold; }
        .menu-trigger { position: absolute; right: 40px; top: 50px; cursor: pointer; z-index: 5001; }
        .menu-trigger span { display: block; width: 35px; height: 3px; background: var(--accent); margin: 6px 0; }

        /* MODAL ZOOM */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal img { max-width: 90%; max-height: 70vh; border: 2px solid var(--accent); border-radius: 10px; margin-bottom: 25px; }
        .modal-controls { display: flex; gap: 15px; }
        .btn-act { border: none; padding: 15px 30px; border-radius: 30px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="menu-trigger" onclick="document.getElementById('sidebar').classList.toggle('active')"><span></span><span></span><span></span></div>

    <header>
        <div class="brand-center">
            <h1>PHOTO PRINT</h1>
            <div class="search-box">
                <input type="number" id="input-busca" placeholder="Nº DA FOTO">
                <button class="search-btn" onclick="executarBusca()">BUSCAR</button>
            </div>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <button class="sidebar-btn" onclick="baixarZip()"><i class="fa-solid fa-download"></i> Baixar Galeria</button>
        <button class="sidebar-btn" style="color:var(--danger)" onclick="limparTudo()"><i class="fa-solid fa-trash"></i> Apagar Servidor</button>
    </div>

    <main class="grid" id="grid-fotos"></main>

    <div class="modal" id="modal-zoom">
        <img id="img-zoom" src="">
        <div class="modal-controls">
            <button class="btn-act" style="background:#333; color:#fff" onclick="fecharZoom()">Voltar</button>
            <button class="btn-act" style="background:var(--accent); color:#000" onclick="reimprimirAtual()">Reimprimir</button>
            <button class="btn-act" style="background:var(--danger); color:#fff" id="btn-excluir-zoom">Excluir</button>
        </div>
    </div>

    <div id="modal-print"><img id="img-print"></div>

<script>
    const API = "https://photoprint-api.maxprimefotovideo.workers.dev";
    let todasFotos = [];
    let chavesLocais = new Set();
    let eventoAtual = "";
    let printQueue = [];
    let isPrinting = false;
    let primeiraCarga = true; 

    async function atualizar() {
        try {
            const resStatus = await fetch(`${API}/status?t=${Date.now()}`);
            const config = await resStatus.json();
            eventoAtual = config.evento || "Geral";

            const resF = await fetch(`${API}/list-photos?evento=${encodeURIComponent(eventoAtual)}&t=${Date.now()}`);
            const dados = await resF.json();
            
            // Filtra apenas JPGs e ignora molduras PNG
            const fotosJpg = dados.filter(f => !f.key.toLowerCase().endsWith('.png'));

            // Identifica o que é novo comparando com o Set local
            const novasFotos = fotosJpg.filter(f => !chavesLocais.has(f.key));

            if (novasFotos.length > 0) {
                for (let f of novasFotos) {
                    const urlCompleta = `${API}/photo/${encodeURIComponent(f.key)}`;
                    todasFotos.push({ id: todasFotos.length + 1, url: urlCompleta, key: f.key });
                    chavesLocais.add(f.key);
                    
                    // Se não for a abertura da página, manda imprimir automaticamente
                    if (!primeiraCarga) {
                        console.log("Auto-Print acionado para:", f.key);
                        addToPrintQueue(urlCompleta);
                    }
                }
                render();
            }

            // Após a primeira execução, libera a impressão automática para as próximas
            primeiraCarga = false;

        } catch(e) { console.error("Erro na atualização:", e); }
    }

    function render() {
        const grid = document.getElementById('grid-fotos');
        grid.innerHTML = todasFotos.slice().reverse().map(f => `
            <div class="card" onclick="abrirZoom('${f.url}', '${f.key}')">
                <span class="badge">#${f.id}</span>
                <img src="${f.url}">
            </div>
        `).join('');
    }

    function addToPrintQueue(src) {
        printQueue.push(src);
        if (!isPrinting) processQueue();
    }

    function processQueue() {
        if (printQueue.length === 0) { isPrinting = false; return; }
        
        isPrinting = true;
        const imgP = document.getElementById('img-print');
        
        imgP.onload = () => {
            window.focus();
            setTimeout(() => { 
                window.print(); 
                // Espera 3 segundos após a impressão para processar a próxima da fila
                setTimeout(processQueue, 3000); 
            }, 1000);
        };
        imgP.src = printQueue.shift();
    }

    function abrirZoom(url, key) {
        document.getElementById('img-zoom').src = url;
        document.getElementById('modal-zoom').style.display = 'flex';
        document.getElementById('btn-excluir-zoom').onclick = () => excluirFoto(key);
    }

    function fecharZoom() { document.getElementById('modal-zoom').style.display = 'none'; }
    function reimprimirAtual() { addToPrintQueue(document.getElementById('img-zoom').src); }

    async function excluirFoto(key) {
        if(confirm("Excluir esta foto permanentemente?")) {
            await fetch(`${API}/delete-photo?key=${encodeURIComponent(key)}`, { method: 'DELETE' });
            location.reload();
        }
    }

    async function baixarZip() {
        const zip = new JSZip();
        for(let f of todasFotos) {
            const blob = await fetch(f.url).then(r => r.blob());
            zip.file(`foto_${f.id}.jpg`, blob);
        }
        const content = await zip.generateAsync({type:"blob"});
        saveAs(content, "galeria_evento.zip");
    }

    async function limparTudo() {
        if(confirm("ATENÇÃO: Isso apagará todas as fotos do servidor!") && prompt("Digite a senha:") === "123") {
            await fetch(`${API}/delete-all`, { method: 'DELETE' });
            location.reload();
        }
    }

    function executarBusca() {
        const idBusca = document.getElementById('input-busca').value;
        const foto = todasFotos.find(f => f.id == idBusca);
        if(foto) abrirZoom(foto.url, foto.key);
        else alert("Foto não encontrada!");
    }

    // Verifica novas fotos a cada 5 segundos
    setInterval(atualizar, 5000);
    atualizar();
</script>
</body>
</html>
