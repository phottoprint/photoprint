<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO PRINT - PRO EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --bg: #020202; --surface: rgba(18, 18, 18, 0.8); --accent: #39ff14;
            --danger: #ff3131; --text: #ffffff;
            --neon-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
            --glass-border: 1px solid rgba(57, 255, 20, 0.3);
        }

        body { background: #000; color: var(--text); font-family: sans-serif; margin: 0; overflow-x: hidden; }

        /* --- CONTROLE DE IMPRESSÃO --- */
        #modal-print { display: none; }

        @media print {
            body * { visibility: hidden !important; }
            #modal-print, #modal-print img {
                visibility: visible !important;
                display: block !important;
                position: fixed; left: 0; top: 0;
            }
            /* Classes de tamanho real para a impressora */
            .print-tirinha { width: 5cm !important; height: 15cm !important; }
            .print-tradicional { width: 15cm !important; height: 10cm !important; }
            .print-polaroid { width: 9cm !important; height: 11cm !important; }
            
            @page { margin: 0; }
        }

        /* Interface Estilizada */
        header { padding: 30px; display: flex; flex-direction: column; align-items: center; border-bottom: var(--glass-border); }
        h1 { color: var(--accent); text-shadow: var(--neon-shadow); letter-spacing: 5px; margin: 0; }
        
        .sidebar { position: fixed; right: -320px; top: 0; width: 280px; height: 100%; background: rgba(10,10,10,0.98); z-index: 5000; transition: 0.4s; padding: 40px 20px; border-left: var(--glass-border); }
        .sidebar.active { right: 0; }

        .menu-trigger { position: absolute; right: 20px; top: 20px; cursor: pointer; z-index: 5001; color: var(--accent); font-size: 30px; }

        .gallery-container { padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; cursor: pointer; position: relative; }
        .card img { width: 100%; display: block; }
        .badge { position: absolute; top: 10px; left: 10px; background: var(--accent); color: #000; padding: 2px 8px; font-weight: bold; border-radius: 4px; font-size: 12px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; flex-direction: column; }
        .modal img { max-height: 80vh; border: 2px solid var(--accent); }
        .btn-print { margin-top: 20px; padding: 15px 40px; background: var(--accent); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }

        select, input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid var(--accent); color: #fff; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="menu-trigger" onclick="document.getElementById('sidebar').classList.toggle('active')"><i class="fas fa-bars"></i></div>

    <div class="sidebar" id="sidebar">
        <h2 style="color: var(--accent);">CONFIGURAÇÕES</h2>
        <label>Formato de Impressão:</label>
        <select id="formato-saida">
            <option value="polaroid">Polaroid (9x11 cm)</option>
            <option value="tradicional" selected>Tradicional (15x10 cm)</option>
            <option value="tirinha">Tirinha (5x15 cm)</option>
        </select>
        <button class="btn-print" style="width: 100%;" onclick="baixarZip()">BAIXAR GALERIA (ZIP)</button>
        <button class="btn-print" style="width: 100%; background: var(--danger); margin-top: 10px;" onclick="limparTudo()">APAGAR TUDO</button>
    </div>

    <header>
        <h1 id="view-evento">CARREGANDO...</h1>
        <input type="number" id="input-busca" placeholder="DIGITE O Nº DA FOTO" style="width: 250px;" oninput="buscarFoto(this.value)">
    </header>

    <main class="gallery-container">
        <div id="grid-fotos" class="grid"></div>
    </main>

    <div class="modal" id="modal-zoom" onclick="this.style.display='none'">
        <img id="img-zoom">
        <button class="btn-print" onclick="event.stopPropagation(); reimprimirAtual()">IMPRIMIR AGORA</button>
    </div>

    <div id="modal-print"><img id="img-print"></div>
    <canvas id="canvas-process" style="display:none;"></canvas>

<script>
    const API = "https://photoprint-api.maxprimefotovideo.workers.dev";
    let todasFotos = [];
    let processadas = new Set(JSON.parse(localStorage.getItem('impressas_local') || '[]'));
    let printQueue = [];
    let isPrinting = false;
    let primeiraCarga = true;

    // Configurações exatas para cada formato (Escala de 100px por cm para alta qualidade)
    const SPECS = {
        polaroid:    { w: 900,  h: 1100, fotoW: 800, fotoH: 750, fotoX: 50,  fotoY: 50,  class: 'print-polaroid' },
        tradicional: { w: 1500, h: 1000, fotoW: 1500, fotoH: 1000, fotoX: 0,  fotoY: 0,  class: 'print-tradicional' },
        tirinha:     { w: 500,  h: 1500, fotoW: 420,  fotoH: 310,  fotoX: 40,  fotoY: 40,  class: 'print-tirinha' }
    };

    async function atualizar() {
        try {
            const resStatus = await fetch(`${API}/status?t=${Date.now()}`);
            const config = await resStatus.json();
            document.getElementById('view-evento').innerText = (config.evento || "EVENTO").toUpperCase();

            const resF = await fetch(`${API}/list-photos?evento=${encodeURIComponent(config.evento)}&t=${Date.now()}`);
            const dados = await resF.json();
            const molduraObj = dados.find(f => f.key.toLowerCase().endsWith('.png'));
            const urlMoldura = molduraObj ? `${API}/photo/${encodeURIComponent(molduraObj.key)}` : "";
            const fotosJpg = dados.filter(f => !f.key.toLowerCase().endsWith('.png'));

            for (const f of fotosJpg) {
                if (!todasFotos.find(x => x.key === f.key)) {
                    const imgFinal = await gerarComposicao(`${API}/photo/${encodeURIComponent(f.key)}`, urlMoldura);
                    const novaFoto = { key: f.key, url: imgFinal, id: fotosJpg.indexOf(f) + 1 };
                    todasFotos.push(novaFoto);
                    
                    if (!processadas.has(f.key)) {
                        processadas.add(f.key);
                        localStorage.setItem('impressas_local', JSON.stringify([...processadas]));
                        if (!primeiraCarga) addToPrintQueue(imgFinal);
                    }
                    render();
                }
            }
            primeiraCarga = false;
        } catch(e) { console.log(e); }
    }

    async function gerarComposicao(fotoUrl, molduraUrl) {
        const fmt = document.getElementById('formato-saida').value;
        const s = SPECS[fmt];
        const canvas = document.getElementById('canvas-process');
        const ctx = canvas.getContext('2d');
        
        canvas.width = s.w; canvas.height = s.h;
        ctx.fillStyle = "white"; ctx.fillRect(0,0, s.w, s.h);

        const load = (url) => new Promise(res => {
            const i = new Image(); i.crossOrigin = "anonymous";
            i.onload = () => res(i); i.onerror = () => res(null); i.src = url;
        });

        const imgFoto = await load(fotoUrl);
        const imgM = molduraUrl ? await load(molduraUrl) : null;

        if (imgFoto) {
            if (fmt === 'tirinha') {
                // Layout Tirinha: 3 fotos com espaçamento de 0.3cm (30px)
                ctx.drawImage(imgFoto, s.fotoX, s.fotoY, s.fotoW, s.fotoH);
                ctx.drawImage(imgFoto, s.fotoX, s.fotoY + 340, s.fotoW, s.fotoH);
                ctx.drawImage(imgFoto, s.fotoX, s.fotoY + 680, s.fotoW, s.fotoH);
            } else {
                // Polaroid ou Tradicional
                ctx.drawImage(imgFoto, s.fotoX, s.fotoY, s.fotoW, s.fotoH);
            }
        }

        if (imgM) ctx.drawImage(imgM, 0, 0, s.w, s.h);
        return canvas.toDataURL("image/jpeg", 0.9);
    }

    function render() {
        const grid = document.getElementById('grid-fotos');
        grid.innerHTML = todasFotos.slice().reverse().map(f => `
            <div class="card" onclick="abrirZoom('${f.url}')">
                <span class="badge">#${f.id}</span>
                <img src="${f.url}">
            </div>
        `).join('');
    }

    function addToPrintQueue(src) {
        printQueue.push(src);
        if (!isPrinting) processNext();
    }

    function processNext() {
        if (printQueue.length === 0) { isPrinting = false; return; }
        isPrinting = true;
        const src = printQueue.shift();
        const imgP = document.getElementById('img-print');
        const containerP = document.getElementById('modal-print');
        
        containerP.className = SPECS[document.getElementById('formato-saida').value].class;
        imgP.onload = () => {
            setTimeout(() => { window.print(); setTimeout(processNext, 2000); }, 500);
        };
        imgP.src = src;
    }

    function abrirZoom(url) {
        document.getElementById('img-zoom').src = url;
        document.getElementById('modal-zoom').style.display = 'flex';
    }

    function reimprimirAtual() { addToPrintQueue(document.getElementById('img-zoom').src); }
    function buscarFoto(v) { 
        const f = todasFotos.find(x => x.id == v); 
        if(f) abrirZoom(f.url); 
    }

    async function limparTudo() {
        if(confirm("Deseja apagar todas as fotos?") && prompt("Senha:") === "123") {
            localStorage.removeItem('impressas_local');
            location.reload();
        }
    }

    setInterval(atualizar, 5000);
    atualizar();
</script>
</body>
</html>
