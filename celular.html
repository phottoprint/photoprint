<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO PRINT - MOBILE v1.1</title>
    <style>
        :root { --neon: #39ff14; --error: #ff0000; }
        body { 
            font-family: 'Segoe UI', sans-serif; text-align: center; 
            background: radial-gradient(circle at 50% 0%, #1a3a12 0%, #000 100%);
            color: white; margin: 0; overflow: hidden; height: 100vh; 
            display: flex; flex-direction: column; 
        }
        
        #offline-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; align-items: center; justify-content: center; }
        .mantencao-txt { color: var(--error); font-size: 28px; font-weight: 900; text-shadow: 0 0 15px var(--error); }

        /* Header Layout */
        .header { margin-top: 40px; z-index: 10; border-left: 4px solid var(--neon); padding-left: 20px; align-self: flex-start; margin-left: 30px; text-align: left; }
        .brand-title { font-size: 38px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); letter-spacing: 5px; margin: 0; text-transform: uppercase; }
        .subtitle { color: white; font-size: 14px; letter-spacing: 3px; margin-top: 5px; opacity: 0.7; font-weight: bold; text-transform: uppercase; }
        #nome-evento-capa { font-size: 22px; font-weight: bold; color: var(--neon); text-transform: uppercase; margin: 20px 0; min-height: 25px; }

        /* Camera UI */
        #cam-container { position: fixed; inset: 0; background: #000; display: none; z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; pointer-events: none; }
        .topo-grupo { 
            background: rgba(0,0,0,0.8); 
            border: 1px solid var(--neon); 
            padding: 15px 30px; 
            border-radius: 15px; 
            width: 85%; 
            max-width: 450px;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #info-topo { font-size: 14px; font-weight: 900; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        #num-count { font-size: 100px; font-weight: 900; color: white; line-height: 1; display: block; text-shadow: 0 0 30px var(--neon); }
        #sub-count { font-size: 14px; font-weight: bold; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; opacity: 0.9; }

        #cam-controls { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; align-items: center; justify-content: space-evenly; width: 100%; pointer-events: auto; }
        .cam-btn { width: 65px; height: 65px; background: rgba(0,0,0,0.6); border: 1px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .shutter-btn { width: 90px; height: 90px; background: black; border-radius: 50%; border: 5px solid var(--neon); cursor: pointer; box-shadow: 0 0 25px var(--neon); }

        /* System */
        #flash { position: fixed; inset: 0; background: white; display: none; z-index: 2000; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .spin { width: 60px; height: 60px; border: 5px solid rgba(57, 255, 20, 0.1); border-top-color: var(--neon); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
        .btn-action { padding: 15px 35px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="offline-screen"><div class="mantencao-txt">SISTEMA EM MANUTENÇÃO</div></div>
    <div id="flash"></div>
    <div id="loader"><div class="spin"></div><p id="loader-text" style="color:var(--neon);margin-top:20px;font-weight:bold;">PROCESSANDO...</p></div>

    <div id="cam-container">
        <video id="v" autoplay playsinline muted></video>
        <div id="overlay">
            <div class="topo-grupo">
                <div id="info-topo">SINCRONIZANDO...</div>
                <span id="num-count"></span>
                <span id="sub-count">AGUARDANDO START</span>
            </div>

            <div id="cam-controls">
                <div class="cam-btn" onclick="voltarHome()">
                    <svg viewBox="0 0 24 24" width="30" fill="var(--neon)"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" /></svg>
                </div>
                <div id="shutter-placeholder"></div>
                <div class="cam-btn" onclick="switchCam()">
                    <svg viewBox="0 0 24 24" width="32" fill="var(--neon)"><path d="M15.5,14L20.5,19L19.08,20.42L14.08,15.42L15.5,14M3,3.27L4.27,2L22,19.73L20.73,21L18.11,18.39C17.09,19.38 15.62,20 14,20H10V17H14C14.7,17 15.35,16.79 15.9,16.42L12,12.52V15L7,10L8.1,8.9L3,3.27M17,10V7H13V10.18L11,8.18V5H17V2L22,7L17,12V10Z" /></svg>
                </div>
            </div>
        </div>
    </div>

    <div class="header">
        <h1 class="brand-title">Photo Print</h1>
        <div class="subtitle">colecionando momentos</div>
        <div id="nome-evento-capa">...</div>
    </div>

    <div class="main-ui" style="flex-grow:1; display:flex; align-items:center; justify-content:center; padding-bottom:80px;">
        <div class="btn-eye" onclick="ligar()" style="width:180px; height:180px; border-radius:50%; border:6px solid #111; background:#000; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow: 0 0 40px rgba(0,0,0,0.5);">
            <div style="width:70px; height:70px; border-radius:50%; border:5px solid var(--neon); box-shadow: 0 0 25px var(--neon), inset 0 0 15px var(--neon);"></div>
        </div>
    </div>

    <canvas id="c-snap" style="display:none"></canvas>
    <canvas id="c-strip" style="display:none"></canvas>

    <script>
        const API = "https://photoprint-api.maxprimefotovideo.workers.dev";
        let ev = ""; let formatStr = ""; let frame = ""; let pics = []; 
        let stream = null; let currentFacingMode = "user"; 
        
        // AJUSTE DE SLOTS 100% PRECISOS (Baseado no seu último print)
        const SLOTS_TIRINHA = [
            { y: 0.038, h: 0.245 }, // Foto 1 - Topo
            { y: 0.301, h: 0.245 }, // Foto 2 - Meio
            { y: 0.564, h: 0.245 }  // Foto 3 - Baixo
        ];

        const FORMATOS = {
            "TIRINHA": { w: 600, h: 1800, fotos: 3, key: "TIRINHA" },
            "POLAROID": { w: 1200, h: 1500, fotos: 1, key: "POLAROID" },
            "10X15": { w: 1800, h: 1200, fotos: 1, key: "10X15" }
        };
        let configAtual = FORMATOS["10X15"];

        async function sync() {
            try {
                const r = await fetch(`${API}/status?t=${Date.now()}`);
                const d = await r.json();
                document.getElementById('offline-screen').style.display = (d.status === "OFFLINE") ? "flex" : "none";
                ev = d.evento || "Geral";
                formatStr = d.formato || "10X15 Standard";
                document.getElementById('nome-evento-capa').innerText = ev;
                document.getElementById('info-topo').innerText = `${ev} | ${formatStr}`;
                
                let tipo = formatStr.toUpperCase().includes("TIRINHA") ? "TIRINHA" : formatStr.toUpperCase().includes("POLAROID") ? "POLAROID" : "10X15";
                configAtual = FORMATOS[tipo];
                await getFrame();
            } catch (e) {}
        }

        async function getFrame() {
            const r = await fetch(`${API}/list-photos?evento=${encodeURIComponent(ev)}&t=${Date.now()}`);
            const arquivos = await r.json();
            const p = arquivos.find(x => x.key.toLowerCase().endsWith('.png'));
            frame = p ? `${API}/photo/${encodeURIComponent(p.key)}` : "";
        }

        async function startStream(mode) {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: mode, width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                const v = document.getElementById('v');
                v.srcObject = stream;
                v.className = (mode === "user") ? "mirror" : "";
            } catch (e) { alert("Erro na camera"); }
        }

        async function switchCam() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            await startStream(currentFacingMode);
        }

        async function ligar() {
            await sync();
            if (!frame) return alert("Moldura não encontrada!");
            document.getElementById('cam-container').style.display = "block";
            await startStream(currentFacingMode);
            document.getElementById('num-count').innerText = "";
            document.getElementById('sub-count').innerText = "CLIQUE PARA INICIAR";
            document.getElementById('shutter-placeholder').innerHTML = '<div onclick="iniciarSequencia()" class="shutter-btn"></div>';
        }

        function voltarHome() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-container').style.display = "none";
        }

        async function iniciarSequencia() {
            document.getElementById('shutter-placeholder').innerHTML = "";
            pics = [];
            for(let n=1; n<=configAtual.fotos; n++) {
                document.getElementById('sub-count').innerText = `PREPARE-SE: FOTO ${n} DE ${configAtual.fotos}`;
                for(let i=5; i>0; i--) { // Contador de 5 segundos restaurado
                    document.getElementById('num-count').innerText = i;
                    await new Promise(r => setTimeout(r, 1000));
                }
                document.getElementById('num-count').innerText = "SORRIA!";
                snap();
                await new Promise(r => setTimeout(r, 1000));
            }
            processarMontagem();
        }

        function snap() {
            const f = document.getElementById('flash');
            f.style.display = "block"; setTimeout(() => f.style.display = "none", 100);
            const v = document.getElementById('v'), cv = document.getElementById('c-snap'), ctx = cv.getContext('2d');
            cv.width = v.videoWidth; cv.height = v.videoHeight;
            if (currentFacingMode === "user") { ctx.translate(cv.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(v, 0, 0);
            const img = new Image(); img.src = cv.toDataURL('image/jpeg', 0.9);
            pics.push(img);
        }

        function processarMontagem() {
            voltarHome();
            document.getElementById('loader').style.display = "flex";
            const cv = document.getElementById('c-strip'), ctx = cv.getContext('2d'), m = new Image();
            m.crossOrigin = "anonymous";
            m.onload = () => {
                cv.width = configAtual.w; cv.height = configAtual.h;
                ctx.fillStyle = "white"; ctx.fillRect(0,0,cv.width, cv.height);

                if (configAtual.key === "TIRINHA") {
                    pics.forEach((img, i) => {
                        const s = SLOTS_TIRINHA[i];
                        const dx = cv.width * 0.07; // Largura um pouco maior
                        const dw = cv.width * 0.86;
                        const dy = cv.height * s.y;
                        const dh = cv.height * s.h;

                        ctx.save();
                        ctx.beginPath(); ctx.rect(dx, dy, dw, dh); ctx.clip();
                        const ratio = Math.max(dw / img.width, dh / img.height);
                        const x = dx + (dw - img.width * ratio) / 2;
                        const y = dy + (dh - img.height * ratio) / 2;
                        ctx.drawImage(img, x, y, img.width * ratio, img.height * ratio);
                        ctx.restore();
                    });
                } else {
                    const img = pics[0];
                    const ratio = Math.max(cv.width / img.width, cv.height / img.height);
                    ctx.drawImage(img, (cv.width - img.width*ratio)/2, (cv.height - img.height*ratio)/2, img.width*ratio, img.height*ratio);
                }
                ctx.drawImage(m, 0, 0, cv.width, cv.height);
                
                document.getElementById('loader').innerHTML = `
                    <img src="${cv.toDataURL('image/jpeg', 0.9)}" style="max-height:65vh; border:2px solid var(--neon); box-shadow: 0 0 20px var(--neon);">
                    <div style="margin-top:20px; display:flex; gap:10px;">
                        <button class="btn-action" style="background:var(--neon); color:black;" onclick="enviar()">GERAR FOTO</button>
                        <button class="btn-action" style="background:#333;color:white;" onclick="location.reload()">SAIR</button>
                    </div>`;
            };
            m.src = frame + "?t=" + Date.now();
        }

        async function enviar() {
            document.getElementById('loader').innerHTML = `<div class="spin"></div><p style="color:var(--neon)">ENVIANDO PARA GALERIA...</p>`;
            document.getElementById('c-strip').toBlob(async b => {
                const fd = new FormData();
                fd.append('file', b, 'foto.jpg'); fd.append('evento', ev); fd.append('tipo', 'foto');
                try { await fetch(`${API}/upload`, { method: 'POST', body: fd }); location.reload(); } catch (e) { alert("Erro no envio!"); location.reload(); }
            }, 'image/jpeg', 0.95);
        }

        setInterval(sync, 10000); sync();
    </script>
</body>
</html>
